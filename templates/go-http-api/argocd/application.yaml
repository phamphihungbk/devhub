apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ service_name }}-{{ environment }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ repo_url }}
    targetRevision: main
    path: charts/app
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true