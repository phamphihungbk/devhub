version: '3.8'
services:
  
  backend:
    image: devhub-backend:latest
    container_name: devhub-backend
    build:
      context: ./backend
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV
    depends_on:
      - db
      - redis
  
  frontend:
    image: devhub-frontend:latest
    container_name: devhub-frontend
    build:
      context: ./frontend
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "80:80"
    environment:
      - ENV
  
  db:
    image: postgres:15
    container_name: devhub-db
    restart: always
    environment:
      POSTGRES_USER: devhub
      POSTGRES_PASSWORD: devhubpass
      POSTGRES_DB: devhub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: devhub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  plugins:
    image: devhub-plugins:latest
    container_name: devhub-plugins
    build:
      context: ./plugins
      dockerfile: infra/docker/plugins.Dockerfile
    environment:
      - ENV

volumes:
  db_data:
  redis_data:
