services:
  backend:
    image: devhub-backend:local
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_ENV: ${SERVICE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://devhub:devhubpass@db:5432/devhub?sslmode=disable}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: devhub-backend:local
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: ["/app/devhub", "sync-worker"]
    env_file:
      - .env
    environment:
      SERVICE_ENV: ${SERVICE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://devhub:devhubpass@db:5432/devhub?sslmode=disable}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: devhub-frontend:local
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    profiles: ["ui"]
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-DevHub}

  nginx:
    image: devhub-nginx:local
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    profiles: ["ui"]
    env_file:
      - .env
    environment:
      DEVHUB_DOMAIN: ${DEVHUB_DOMAIN:-devhub.local}
      DEVHUB_API_DOMAIN: ${DEVHUB_API_DOMAIN:-api.devhub.local}
      GITEA_DOMAIN: ${GITEA_DOMAIN:-gitea.devhub.local}
      DEVHUB_SSL_CERT_FILE: ${DEVHUB_SSL_CERT_FILE:-devhub.local.crt}
      DEVHUB_SSL_KEY_FILE: ${DEVHUB_SSL_KEY_FILE:-devhub.local.key}
    depends_on:
      - backend
      - frontend
      - gitea
    volumes:
      - ./infra/certs:/etc/nginx/certs:ro

  db:
    image: devhub-db:local
    build:
      context: .
      dockerfile: infra/docker/db.Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devhubpass}
      POSTGRES_DB: ${POSTGRES_DB:-devhub}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devhub} -d ${POSTGRES_DB:-devhub}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: devhub-redis:local
    build:
      context: .
      dockerfile: infra/docker/redis.Dockerfile
    volumes:
      - redis_data:/data

  devhub-registry:
    image: devhub-registry:local
    build:
      context: .
      dockerfile: infra/docker/registry.Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry

  gitea:
    image: devhub-gitea:local
    build:
      context: .
      dockerfile: infra/docker/gitea.Dockerfile
    restart: unless-stopped
    environment:
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-gitea.devhub.local}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-https://gitea.devhub.local/}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:-gitea.devhub.local}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__database__DB_TYPE: sqlite3
    volumes:
      - gitea_data:/data
      - gitea_config:/etc/gitea

  gitea-runner:
    image: devhub-gitea-runner:local
    build:
      context: .
      dockerfile: infra/docker/gitea-runner.Dockerfile
    profiles: ["ci"]
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL: ${GITEA_RUNNER_INSTANCE_URL:-http://gitea:3000}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN:-}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME:-devhub-runner}
      GITEA_RUNNER_LABELS: ${GITEA_RUNNER_LABELS:-linux:docker://docker:27-cli}
    depends_on:
      - gitea
    volumes:
      - gitea_runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  db_data:
  redis_data:
  registry_data:
  gitea_data:
  gitea_config:
  gitea_runner_data:
