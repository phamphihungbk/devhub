appProject: "[[ CD_PROJECT_NAME ]]"
appName: "[[ SERVICE_NAME ]]" 
appEnvironment: "[[ ENVIRONMENT ]]" 
appRepoURL: "[[ CD_REPO_URL ]]"
appTargetRevision: "[[ CD_TARGET_REVISION ]]"
appNamespace: "[[ CD_NAMESPACE ]]"
nameOverride: "[[ SERVICE_NAME ]]"
fullnameOverride: "[[ SERVICE_NAME ]]"

replicaCount: 1

image:
  repository: "[[ CD_IMAGE_REPOSITORY ]]"
  tag: "[[ IMAGE_TAG ]]"
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  port: [[ PORT ]]

containerPort: [[ PORT ]]

ingress:
  enabled: false
  className: ""
  host: "[[ SERVICE_NAME ]].devhub.local"
  path: /

serviceAccount:
  create: true
  name: ""

config:
  enabled: false
  values: {}
