apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fullnameOverride | default .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.fullnameOverride | default .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Values.fullnameOverride | default .Chart.Name }}
    spec:
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ .Values.fullnameOverride | default .Chart.Name }}{{ end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ if .Values.image.tag }}{{ .Values.image.repository }}:{{ .Values.image.tag }}{{ else }}{{ .Values.image.repository }}{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
