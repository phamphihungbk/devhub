apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: [[ SERVICE_NAME ]]-[[ TARGET_REVISION ]]
  namespace: argocd
spec:
  project: [[ ARGOCD_PROJECT ]]
  source:
    repoURL: [[ REPO_URL ]]
    targetRevision: [[ TARGET_REVISION ]]
    path: deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: [[ NAMESPACE ]]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
