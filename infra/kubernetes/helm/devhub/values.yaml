nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/phamphihungbk/devhub-backend
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

config:
  servicePort: ":8080"
  serviceEnv: production
  serviceErrorPrefix: TR
  otelCollectorEndpoint: ""
  databaseUrl: postgres://devhub:devhubpass@postgresql.default.svc.cluster.local:5432/devhub?sslmode=disable
  databaseMaxOpenConns: "30"
  databaseMaxIdleConns: "15"
  databaseConnMaxLifetime: 30m
  databaseConnMaxIdleTime: 5m
  tokenDuration: "3600"
  tokenIssuer: devhub-backend
  appTimezone: Europe/Vienna
  seatLockTTL: 300s

secrets:
  tokenSecret: change-me
  argocdAuthToken: change-me

api:
  enabled: true
  replicaCount: 1
  command: []
  args: []
  service:
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  podLabels: {}
  extraEnv:
    SERVICE_NAME: devhub-backend-api
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  enabled: true
  replicaCount: 1
  command:
    - /app/devhub
    - sync-worker
  args:
    - --concurrency
    - "1"
    - --poll-interval
    - 3s
    - --types
    - scaffold,deployment
  podAnnotations: {}
  podLabels: {}
  extraEnv:
    SERVICE_NAME: devhub-backend-worker
    ARGOCD_SERVER: argocd-server.argocd.svc.cluster.local:443
    ARGOCD_INSECURE: "true"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devhub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
