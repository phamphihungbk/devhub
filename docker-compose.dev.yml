services:
  backend:
    build:
      target: dev
      args:
        MODE: dev
    command: ["go", "run", ".", "serve"]
    environment:
      SERVICE_ENV: development
    volumes:
      - ./backend:/app/backend

  worker:
    build:
      target: dev
      args:
        MODE: dev
    command: ["go", "run", ".", "sync-worker"]
    environment:
      SERVICE_ENV: development
    volumes:
      - ./backend:/app/backend
      - ./plugins:/app/plugins

  frontend:
    build:
      target: dev
      args:
        MODE: dev
    command: ["sh", "-c", "if [ -f package.json ]; then corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 3000; else echo 'frontend/package.json not found; skipping frontend startup' && sleep infinity; fi"]
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend:8080
      VITE_APP_TITLE: DevHub
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    ports:
      - "80:80"
      - "443:443"

  db:
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  redis:
    ports:
      - "6379:6379"

  otel-collector:
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"

  tempo:
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"

  grafana:
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"

  gitea:
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_HOST_PORT:-2222}:22"

  devhub-registry:
    ports:
      - "5001:5000"    

volumes:
  frontend_node_modules:
