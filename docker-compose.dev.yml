services:
  backend:
    build:
      target: dev
      args:
        MODE: dev
    command: ["go", "run", ".", "serve"]
    environment:
      SERVICE_ENV: development
    volumes:
      - ./backend:/app/backend
      - ./plugins:/app/plugins
      - ./generated:/app/generated

  frontend:
    build:
      target: dev
      args:
        MODE: dev
    command: ["sh", "-c", "if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0 --port 3000; else echo 'frontend/package.json not found; skipping frontend startup' && sleep infinity; fi"]
    environment:
      NODE_ENV: development
      NUXT_BACKEND_BASE_URL: http://nginx/api
    volumes:
      - ./frontend:/app

  nginx:
    ports:
      - "80:80"
      - "443:443"

  db:
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  redis:
    ports:
      - "6379:6379"
